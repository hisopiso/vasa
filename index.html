<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moje Fullscreen Video</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
        }

        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Roztáhne video přes celou obrazovku */
        }
    </style>
</head>
<body>

    <video autoplay loop muted controls>
        <source src="video.mp4" type="video/mp4">
        
        Tvůj prohlížeč nepodporuje přehrávání videa.
    </video>

</body>
</html>
