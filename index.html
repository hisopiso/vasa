<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fullscreen Video</title>
    <style>
        /* Odstraníme okraje a nastavíme černé pozadí */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden; /* Skryje posuvníky na boku */
        }

        /* Styl pro video soubor (.mp4) */
        video {
            width: 100vw;
            height: 100vh;
            object-fit: cover; /* Vyplní celou obrazovku (pokud nechceš ořez, změň na 'contain') */
        }

        /* Styl pro YouTube */
        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
        }
    </style>
</head>
